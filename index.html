<div id="fdt-root"></div>
<style>
#fdt-root, #fdt-root * { box-sizing: border-box; }
#fdt-root {
  --charcoal: #424242;
  --charcoal-deep: #2a2a2a;
  --gray: #727272;
  --gray-soft: #E4E4E4;
  --red: #EA1D24;
  --red-soft: #FBE1E2;
  --ok: #2E7D5B;
  --ok-soft: #DCEEE6;
  --taupe: #B08D57;
  --taupe-soft: #F0E6D6;
  --paper: #FAFAFA;
  --card: #FFFFFF;
  --ink: #2a2a2a;
  --muted: #727272;
  --border: #E4E4E4;
  font-family: Calibri, "Segoe UI", Arial, sans-serif;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  padding: 0;
}
#fdt-root h1, #fdt-root h2, #fdt-root h3 { font-family: Cambria, Georgia, serif; margin: 0; }
#fdt-root .topbar {
  background: #fff;
  color: var(--charcoal);
  padding: 20px 28px 16px;
  border-bottom: 3px solid var(--red);
  display: flex; align-items: center; gap: 18px;
}
#fdt-root .topbar img.brand-logo { height: 54px; width: auto; display: block; }
#fdt-root .topbar .brand-divider { width: 1px; height: 44px; background: var(--gray-soft); }
#fdt-root .topbar .eyebrow {
  color: var(--gray);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 3px;
  font-weight: 600;
}
#fdt-root .topbar h1 { font-size: 21px; font-weight: 700; color: var(--charcoal); }
#fdt-root .topbar .sub { color: var(--gray); font-size: 12.5px; margin-top: 3px; }
#fdt-root .tabs {
  display: flex; gap: 2px; background: var(--charcoal-deep);
  padding: 0 28px;
}
#fdt-root .tab {
  padding: 12px 20px; color: #b8b8b8; cursor: pointer;
  font-size: 13.5px; font-weight: 600; border-bottom: 3px solid transparent;
  user-select: none;
}
#fdt-root .tab.active { color: #fff; border-bottom-color: var(--red); background: rgba(255,255,255,0.05); }
#fdt-root .content { padding: 24px 28px 60px; max-width: 1180px; margin: 0 auto; }
#fdt-root .card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; margin-bottom: 18px;
}
#fdt-root .card h2 { font-size: 16px; color: var(--charcoal); margin-bottom: 14px; }
#fdt-root .card h2 .n { color: var(--red); margin-right: 8px; }
#fdt-root .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
#fdt-root .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
#fdt-root label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
#fdt-root select, #fdt-root input[type=number], #fdt-root input[type=date], #fdt-root textarea {
  width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-family: Calibri, sans-serif; font-size: 14px; background: #fff; color: var(--ink);
}
#fdt-root .field { margin-bottom: 14px; }
#fdt-root .radiorow { display: flex; gap: 8px; flex-wrap: wrap; }
#fdt-root .radiobtn {
  padding: 8px 13px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px;
  cursor: pointer; background: #fff; color: var(--muted); user-select: none;
}
#fdt-root .radiobtn.sel { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }
#fdt-root .btn {
  background: var(--charcoal); color: #fff; border: none; padding: 11px 22px; border-radius: 6px;
  font-weight: 700; font-size: 14px; cursor: pointer; font-family: Calibri, sans-serif;
}
#fdt-root .btn:hover { background: var(--charcoal-deep); }
#fdt-root .btn.gold { background: var(--red); color: #fff; }
#fdt-root .btn.small { padding: 6px 12px; font-size: 12px; }
#fdt-root .btn.ghost { background: transparent; color: var(--red); border: 1px solid var(--red-soft); }
#fdt-root .hint { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
#fdt-root table { width: 100%; border-collapse: collapse; font-size: 13px; }
#fdt-root th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; border-bottom: 2px solid var(--border); }
#fdt-root td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
#fdt-root tr:last-child td { border-bottom: none; }
#fdt-root .barwrap { background: #eee; border-radius: 4px; height: 8px; width: 100%; overflow: hidden; }
#fdt-root .barfill { height: 100%; border-radius: 4px; }
#fdt-root .kpi { display: flex; flex-direction: column; }
#fdt-root .kpi .val { font-family: Cambria, Georgia, serif; font-size: 26px; color: var(--charcoal); font-weight: 700; }
#fdt-root .kpi .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
#fdt-root .pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; }
#fdt-root .pill.win { background: var(--ok-soft); color: var(--ok); }
#fdt-root .pill.loss { background: var(--red-soft); color: var(--red); }
#fdt-root .pill.neutral { background: #eee; color: var(--muted); }
#fdt-root .pill.pending { background: var(--taupe-soft); color: #7a5f2e; }
#fdt-root .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
#fdt-root .toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--charcoal); color: #fff; padding: 11px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.2); z-index: 999;
}
#fdt-root .quad-label { font-size: 10.5px; fill: var(--muted); font-family: Calibri, sans-serif; }
#fdt-root .dot-label { font-size: 10px; fill: #fff; font-weight: 700; font-family: Calibri, sans-serif; text-anchor: middle; }
#fdt-root .axis-label { font-size: 11px; fill: var(--muted); font-family: Calibri, sans-serif; }
#fdt-root .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; color: var(--muted); }
#fdt-root .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
#fdt-root .inline-edit { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#fdt-root .inline-edit select, #fdt-root .inline-edit input { width: auto; min-width: 90px; }
#fdt-root .badge-note { background: var(--taupe-soft); color: #7a5f2e; padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 14px; }
</style>
<script>
(function(){
  const HODS = ["Sales & Marketing","Engineering","Finance/Accounts","D&D","ERP","Legal","Purchase","Quality","Safety","Store","HR-Admin","Facility","Estimation","CBD","BD"];
  const TRIGGERS = [
    {code:1, label:"Authority-limit decision", short:"Authority limit", weight:0.7, color:"#BFBFBF"},
    {code:2, label:"Risk-transfer / cover-seeking", short:"Risk-transfer", weight:1.3, color:"#EA1D24"},
    {code:3, label:"Cross-functional conflict", short:"X-func conflict", weight:1.0, color:"#B08D57"},
    {code:4, label:"Firefighting / rework", short:"Firefighting", weight:1.3, color:"#8C2B26"},
    {code:5, label:"Information relay", short:"Info relay", weight:0.6, color:"#727272"},
    {code:6, label:"Genuine strategic input", short:"Strategic input", weight:0.3, color:"#2E7D5B"},
    {code:7, label:"Regular job / scheduled review", short:"Regular job", weight:0.2, color:"#5D7A99"},
  ];
  const URL_KEY = "fdt-script-url";
  let entries = [];
  let scriptUrl = null;
  let connectionStatus = "unconfigured";
  let connectionError = "";
  let activeTab = "log";
  let formState = { founder:"SSS", hod:HODS[0], duration:15, trigger:1, couldDecide:"unclear", urgency:"not-urgent" };
  let dashFilter = { days: 90, founder: "all" };

  const root = document.getElementById("fdt-root");

  function uid(){ return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }

  function jsonp(params){
    return new Promise((resolve, reject) => {
      if (!scriptUrl) { reject(new Error("No Google Sheet connected yet")); return; }
      const cbName = "fdtCb_" + Date.now() + "_" + Math.floor(Math.random()*10000);
      const qs = Object.keys(params).map(k => encodeURIComponent(k) + "=" + encodeURIComponent(params[k] == null ? "" : params[k])).join("&");
      const sep = scriptUrl.indexOf("?") >= 0 ? "&" : "?";
      const script = document.createElement('script');
      script.src = scriptUrl + sep + qs + "&callback=" + cbName;
      let done = false;
      window[cbName] = (data) => { done = true; resolve(data); delete window[cbName]; script.remove(); };
      script.onerror = () => { if (!done) { reject(new Error("Could not reach the Google Sheet")); delete window[cbName]; script.remove(); } };
      setTimeout(() => { if (!done) { reject(new Error("Request to Google Sheet timed out")); delete window[cbName]; script.remove(); } }, 15000);
      document.body.appendChild(script);
    });
  }

  const api = {
    list: () => jsonp({action:'list'}),
    add: (entry) => jsonp(Object.assign({action:'add'}, entry)),
    update: (id, fields) => jsonp(Object.assign({action:'update', id}, fields)),
    remove: (id) => jsonp({action:'delete', id}),
  };

  async function loadScriptUrlConfig(){
    try {
      const res = await window.storage.get(URL_KEY, true);
      scriptUrl = res && res.value ? res.value : null;
    } catch(e) { scriptUrl = null; }
  }
  async function saveScriptUrlConfig(url){
    scriptUrl = url;
    try { await window.storage.set(URL_KEY, url, true); } catch(e) {}
  }

  async function refreshEntries(){
    if (!scriptUrl) { connectionStatus = "unconfigured"; entries = []; return; }
    connectionStatus = "connecting";
    try {
      const res = await api.list();
      if (res && res.ok) {
        entries = (res.entries || []).map(normalizeEntry);
        connectionStatus = "connected";
      } else {
        connectionStatus = "error";
        connectionError = (res && res.error) || "Sheet returned an unexpected response";
      }
    } catch(e) {
      connectionStatus = "error";
      connectionError = e.message;
    }
  }

  function normalizeEntry(e){
    return {
      id: e.id, date: e.date, founder: e.founder, hod: e.hod,
      durationMin: parseInt(e.durationMin) || 0,
      trigger: parseInt(e.trigger) || 6,
      couldDecide: e.couldDecide || "unclear",
      urgency: e.urgency || "not-urgent",
      note: e.note || "",
      decisionTimeHours: (e.decisionTimeHours === "" || e.decisionTimeHours == null) ? null : parseFloat(e.decisionTimeHours),
      outcome: e.outcome || "pending",
      valueBand: e.valueBand || null,
    };
  }

  function showToast(msg){
    const t = document.createElement('div');
    t.className = 'fdt-toast-el';
    t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#424242;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,0.2);z-index:999;font-family:Calibri,sans-serif;";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2200);
  }

  function triggerByCode(c){ return TRIGGERS.find(t=>t.code===c); }

  function filteredEntries(){
    const cutoff = dashFilter.days === 0 ? null : Date.now() - dashFilter.days*24*3600*1000;
    return entries.filter(e => {
      if (cutoff && new Date(e.date).getTime() < cutoff) return false;
      if (dashFilter.founder !== "all" && e.founder !== dashFilter.founder) return false;
      return true;
    });
  }

    root.innerHTML = `

  function renderConnectionGate(content){
    content.innerHTML = `
      <div class="card">
        <h2><span class="n">·</span>Connect your Google Sheet first</h2>
        <div class="hint" style="margin-bottom:14px;">
          ${connectionStatus==='error'
            ? 'Could not reach the sheet: ' + escapeHtml(connectionError) + '. Check the Web App URL in Sheet Connection.'
            : 'This tracker reads and writes to a Google Sheet through a small Apps Script backend — same pattern as the rest of Mangalam HQ. Open the Sheet Connection tab to set it up.'}
        </div>
        <button class="btn gold" id="goto-settings">Go to Sheet Connection</button>
      </div>
    `;
    content.querySelector('#goto-settings').addEventListener('click', ()=>{ activeTab='settings'; render(); });
  }

  function renderLog(content){
    content.innerHTML = `
      <div class="badge-note">Entries save straight to your Google Sheet — visible to anyone with access to that sheet (SSS, RP, or whoever logs on their behalf).</div>
      <div class="card">
        <h2><span class="n">01</span>Log a founder-time interaction</h2>
        <div class="grid3">
          <div class="field">
            <label>Founder</label>
            <div class="radiorow" id="f-founder">
              ${["SSS","RP"].map(f=>`<div class="radiobtn ${formState.founder===f?'sel':''}" data-val="${f}">${f}</div>`).join('')}
            </div>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date" value="${todayStr()}">
          </div>
          <div class="field">
            <label>Duration (minutes)</label>
            <input type="number" id="f-duration" min="1" value="${formState.duration}">
          </div>
        </div>
        <div class="field">
          <label>Which HOD / department consumed this time</label>
          <select id="f-hod">${HODS.map(h=>`<option value="${h}" ${formState.hod===h?'selected':''}>${h}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label>Trigger type — what kind of ask was this</label>
          <div class="radiorow" id="f-trigger">
            ${TRIGGERS.map(t=>`<div class="radiobtn ${formState.trigger===t.code?'sel':''}" data-val="${t.code}" title="${t.label}">${t.short}</div>`).join('')}
          </div>
          <div class="hint">${triggerByCode(formState.trigger).label} — ${triggerHint(formState.trigger)}</div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Could the HOD have decided this alone?</label>
            <div class="radiorow" id="f-could">
              ${[["yes","Yes — didn't use their authority"],["no","No — genuinely above their authority"],["unclear","Unclear — authority matrix silent"]].map(o=>`<div class="radiobtn ${formState.couldDecide===o[0]?'sel':''}" data-val="${o[0]}">${o[1]}</div>`).join('')}
            </div>
          </div>
          <div class="field">
            <label>Urgency</label>
            <div class="radiorow" id="f-urgency">
              ${[["blocking","Blocking a deal/site now"],["time-sensitive","Time-sensitive (days)"],["not-urgent","Not urgent"]].map(o=>`<div class="radiobtn ${formState.urgency===o[0]?'sel':''}" data-val="${o[0]}">${o[1]}</div>`).join('')}
            </div>
          </div>
        </div>
        <div class="field">
          <label>Note (optional)</label>
          <textarea id="f-note" rows="2" placeholder="One line on what this was about"></textarea>
        </div>
        <button class="btn gold" id="f-submit">Save entry</button>
      </div>
      <div class="card">
        <h2><span class="n">02</span>Recent entries</h2>
        ${renderRecentTable()}
      </div>
    `;

    content.querySelector('#f-duration').addEventListener('change', e=>{ formState.duration = parseInt(e.target.value)||1; });

      const btn = content.querySelector('#f-submit');
      const date = content.querySelector('#f-date').value || todayStr();
      const hod = content.querySelector('#f-hod').value;
      const duration = parseInt(content.querySelector('#f-duration').value) || 1;
      const note = content.querySelector('#f-note').value.trim();
      const entry = {
        id: uid(), date, founder: formState.founder, hod, durationMin: duration,
        trigger: formState.trigger, couldDecide: formState.couldDecide, urgency: formState.urgency,
        note, decisionTimeHours: '', outcome: (formState.urgency==='not-urgent' ? 'neutral' : 'pending'), valueBand: ''
      };
      btn.textContent = "Saving…"; btn.disabled = true;
      try {
        const res = await api.add(entry);
        if (!res || !res.ok) throw new Error((res && res.error) || "Sheet rejected the entry");
        await refreshEntries();
        showToast("Entry saved to Google Sheet");
        formState.duration = 15;
        renderLog(content);
      } catch(e) {
        showToast("Could not save: " + e.message);
        btn.textContent = "Save entry"; btn.disabled = false;
      }
    });
  }

  function triggerHint(code){
    return ({
      1:"Fixable via Authority Matrix — raise their sanctioned limit.",
      2:"Capability/confidence gap — they had the authority but escalated anyway.",
      3:"Structural — belongs in the weekly HOD forum, not founder 1:1 time.",
      4:"Quality/skill gap — founder pulled in after something broke.",
      5:"Should be async — a dashboard line, not founder time.",
      6:"Healthy founder time — genuinely new territory.",
      7:"Business-as-usual — a scheduled review, sign-off, or standing meeting that's simply part of the role. Expected time, not dependency."
    })[code];
  }

  function renderRecentTable(){
    const recent = entries.slice().sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,10);
    if (!recent.length) return `<div class="empty">No entries yet — log the first one above.</div>`;
    return `<table><thead><tr><th>Date</th><th>Founder</th><th>HOD</th><th>Min</th><th>Trigger</th><th>Could decide alone?</th><th>Outcome</th><th></th></tr></thead><tbody>
      ${recent.map(e=>`<tr>
        <td>${e.date}</td><td>${e.founder}</td><td>${e.hod}</td><td>${e.durationMin}</td>
        <td>${triggerByCode(e.trigger).short}</td>
        <td>${e.couldDecide}</td>
        <td>${outcomePill(e.outcome)}</td>
        <td><span class="btn ghost small" data-del="${e.id}">Delete</span></td>
      </tr>`).join('')}
    </tbody></table>`;
  }

  function outcomePill(o){
    const map = {win:"Win", loss:"Loss", neutral:"Neutral", pending:"Pending"};
    return `<span class="pill ${o}">${map[o]||o}</span>`;
  }

  function renderPending(content){
    const pending = entries.filter(e=>e.outcome==='pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
    content.innerHTML = `
      <div class="card">
        <h2><span class="n">·</span>Blocking / time-sensitive escalations awaiting an outcome</h2>
        ${pending.length ? '' : '<div class="empty">Nothing pending — every urgent entry has been closed out.</div>'}
        <div id="pending-list"></div>
      </div>
    `;
    const list = content.querySelector('#pending-list');
    pending.forEach(e => {
      const row = document.createElement('div');
      row.style.cssText = "border-top:1px solid #E4E4E4;padding:14px 0;";
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <div>
            <strong>${e.hod}</strong> · ${e.date} · ${e.founder} · ${triggerByCode(e.trigger).short} · ${e.durationMin} min
            ${e.note ? `<div class="hint">${escapeHtml(e.note)}</div>` : ''}
          </div>
        </div>
        <div class="inline-edit" style="margin-top:8px;">
          <label style="margin:0;font-size:11px;">Time-to-decision (hrs)</label>
          <input type="number" min="0" class="tt-hours" style="width:80px;">
          <label style="margin:0;font-size:11px;">Outcome</label>
          <select class="tt-outcome">
            <option value="win">Win</option>
            <option value="loss">Loss</option>
            <option value="neutral">Neutral</option>
          </select>
          <label style="margin:0;font-size:11px;">Value band</label>
          <select class="tt-value">
            <option value="">—</option>
            <option value="<10L">&lt; 10L</option>
            <option value="10-50L">10L–50L</option>
            <option value="50L-1Cr">50L–1Cr</option>
            <option value=">1Cr">&gt; 1Cr</option>
          </select>
          <button class="btn small tt-save">Save</button>
        </div>
      `;
      row.querySelector('.tt-save').addEventListener('click', async (ev)=>{
        const hrs = parseFloat(row.querySelector('.tt-hours').value);
        const outcome = row.querySelector('.tt-outcome').value;
        const vb = row.querySelector('.tt-value').value;
        ev.target.textContent = "Saving…"; ev.target.disabled = true;
        try {
          const res = await api.update(e.id, {
            decisionTimeHours: isNaN(hrs) ? '' : hrs,
            outcome, valueBand: vb || ''
          });
          if (!res || !res.ok) throw new Error((res && res.error) || "Sheet rejected the update");
          await refreshEntries();
          showToast("Outcome recorded in Google Sheet");
          renderPending(content);
        } catch(err) {
          showToast("Could not save: " + err.message);
          ev.target.textContent = "Save"; ev.target.disabled = false;
        }
      });
      list.appendChild(row);
    });
  }

  function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  function renderDashboard(content){
    const data = filteredEntries();
    content.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
          <h2 style="margin:0;"><span class="n">·</span>Filters</h2>
          <div class="inline-edit">
            <select id="d-days">
              <option value="30">Last 30 days</option>
              <option value="90" selected>Last 90 days</option>
              <option value="365">Last 12 months</option>
              <option value="0">All time</option>
            </select>
            <select id="d-founder">
              <option value="all">Both founders</option>
              <option value="SSS">SSS only</option>
              <option value="RP">RP only</option>
            </select>
          </div>
        </div>
      </div>
      ${data.length ? '' : '<div class="card"><div class="empty">No entries in this window yet. Log some interactions to see the picture build.</div></div>'}
      <div id="dash-body"></div>
    `;
    content.querySelector('#d-days').value = String(dashFilter.days);
    content.querySelector('#d-founder').value = dashFilter.founder;
    content.querySelector('#d-days').addEventListener('change', e=>{ dashFilter.days = parseInt(e.target.value); renderDashboard(content); });
    content.querySelector('#d-founder').addEventListener('change', e=>{ dashFilter.founder = e.target.value; renderDashboard(content); });
    if (!data.length) return;

    const body = content.querySelector('#dash-body');
    body.innerHTML = renderKPIs(data) + renderHodTable(data) + renderHandholdMap(data) + renderDecisionSpeed(data);
  }

  function renderKPIs(data){
    const totalMin = data.reduce((s,e)=>s+e.durationMin,0);
    const totalHrs = (totalMin/60).toFixed(1);
    const byHod = groupByHod(data);
    const topHod = Object.entries(byHod).sort((a,b)=>b[1].totalMin-a[1].totalMin)[0];
    const blocking = data.filter(e=>e.urgency!=='not-urgent' && e.decisionTimeHours!=null);
    const avgDecision = blocking.length ? (blocking.reduce((s,e)=>s+e.decisionTimeHours,0)/blocking.length).toFixed(1) : '—';
    const fast = blocking.filter(e=>e.decisionTimeHours<=24);
    const slow = blocking.filter(e=>e.decisionTimeHours>72);
    const fastWinRate = fast.length ? Math.round(100*fast.filter(e=>e.outcome==='win').length/fast.length) : null;
    const slowWinRate = slow.length ? Math.round(100*slow.filter(e=>e.outcome==='win').length/slow.length) : null;
    return `<div class="card"><div class="grid3">
      <div class="kpi"><div class="val">${totalHrs} hrs</div><div class="lbl">Founder time logged</div></div>
      <div class="kpi"><div class="val">${topHod ? topHod[0] : '—'}</div><div class="lbl">Heaviest draw on founder time</div></div>
      <div class="kpi"><div class="val">${avgDecision}${avgDecision!=='—'?' hrs':''}</div><div class="lbl">Avg. time-to-decision (urgent items)</div></div>
    </div>
    ${(fastWinRate!=null || slowWinRate!=null) ? `<div class="hint" style="margin-top:12px;">${fastWinRate!=null?`Decisions closed within 24 hrs won <strong>${fastWinRate}%</strong> of the time.`:''} ${slowWinRate!=null?`Decisions that took over 72 hrs won <strong>${slowWinRate}%</strong> of the time.`:''}</div>` : ''}
    </div>`;
  }

  function groupByHod(data){
    const g = {};
    HODS.forEach(h => g[h] = {totalMin:0, byTrigger:{}, could:{yes:0,no:0,unclear:0}, count:0});
    data.forEach(e => {
      if (!g[e.hod]) g[e.hod] = {totalMin:0, byTrigger:{}, could:{yes:0,no:0,unclear:0}, count:0};
      g[e.hod].totalMin += e.durationMin;
      g[e.hod].byTrigger[e.trigger] = (g[e.hod].byTrigger[e.trigger]||0) + e.durationMin;
      g[e.hod].could[e.couldDecide] = (g[e.hod].could[e.couldDecide]||0) + 1;
      g[e.hod].count += 1;
    });
    return g;
  }

  function renderHodTable(data){
    const g = groupByHod(data);
    const rows = Object.entries(g).filter(([h,v])=>v.count>0).map(([hod,v])=>{
      const score = TRIGGERS.reduce((s,t)=> s + (v.byTrigger[t.code]||0)*t.weight, 0);
      return {hod, ...v, score};
    }).sort((a,b)=>b.score-a.score);
    const maxScore = Math.max(...rows.map(r=>r.score), 1);
    return `<div class="card">
      <h2><span class="n">·</span>Founder dependency by HOD</h2>
      <table><thead><tr><th>HOD</th><th>Time</th><th>Bucket mix</th><th>Escalation-to-authority ratio</th><th>Dependency score</th></tr></thead><tbody>
      ${rows.map(r=>{
        const ratio = Math.round(100*r.could.yes/(r.count));
        return `<tr>
          <td><strong>${r.hod}</strong></td>
          <td>${(r.totalMin/60).toFixed(1)} hrs</td>
          <td style="min-width:140px;">${bucketBar(r.byTrigger)}</td>
          <td>${ratio}% <span class="hint" style="display:inline;">avoidable</span></td>
          <td style="min-width:120px;"><div class="barwrap"><div class="barfill" style="width:${Math.round(100*r.score/maxScore)}%;background:${ratio>40?'#EA1D24':(ratio>20?'#B08D57':'#2E7D5B')};"></div></div></td>
        </tr>`;
      }).join('')}
      </tbody></table>
      <div class="legend">${TRIGGERS.map(t=>`<span><span class="sw" style="background:${t.color};"></span>${t.short}</span>`).join('')}</div>
    </div>`;
  }

  function bucketBar(byTrigger){
    const total = Object.values(byTrigger).reduce((a,b)=>a+b,0) || 1;
    return `<div style="display:flex;height:10px;border-radius:4px;overflow:hidden;width:100%;">
      ${TRIGGERS.map(t=>{
        const w = 100*(byTrigger[t.code]||0)/total;
        return w>0 ? `<div style="width:${w}%;background:${t.color};" title="${t.label}"></div>` : '';
      }).join('')}
    </div>`;
  }

  function renderHandholdMap(data){
    const g = groupByHod(data);
    const rows = Object.entries(g).filter(([h,v])=>v.count>0).map(([hod,v])=>{
      const ratio = 100*v.could.yes/v.count;
      return {hod, totalMin: v.totalMin, ratio, count: v.count};
    });
    if (!rows.length) return '';
    const maxTime = Math.max(...rows.map(r=>r.totalMin), 1);
    const medTime = median(rows.map(r=>r.totalMin));
    const W=640,H=380,PAD=50;
    const xScale = v => PAD + (v/maxTime)*(W-2*PAD);
    const yScale = v => (H-PAD) - (v/100)*(H-2*PAD);
    const medX = xScale(medTime);
    const medY = yScale(50);
    let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-width:640px;display:block;margin:0 auto;">`;
    svg += `<rect x="${medX}" y="${PAD}" width="${W-PAD-medX}" height="${medY-PAD}" fill="#FBE1E2" opacity="0.6"/>`;
    svg += `<rect x="${PAD}" y="${PAD}" width="${medX-PAD}" height="${medY-PAD}" fill="#DCEEE6" opacity="0.6"/>`;
    svg += `<rect x="${medX}" y="${medY}" width="${W-PAD-medX}" height="${H-PAD-medY}" fill="#eee" opacity="0.35"/>`;
    svg += `<rect x="${PAD}" y="${medY}" width="${medX-PAD}" height="${H-PAD-medY}" fill="#eee" opacity="0.15"/>`;
    svg += `<line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#ccc"/>`;
    svg += `<line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="#ccc"/>`;
    svg += `<line x1="${medX}" y1="${PAD}" x2="${medX}" y2="${H-PAD}" stroke="#ccc" stroke-dasharray="3,3"/>`;
    svg += `<line x1="${PAD}" y1="${medY}" x2="${W-PAD}" y2="${medY}" stroke="#ccc" stroke-dasharray="3,3"/>`;
    svg += `<text x="${W/2}" y="${H-14}" class="axis-label" text-anchor="middle">Founder time consumed →</text>`;
    svg += `<text x="16" y="${H/2}" class="axis-label" transform="rotate(-90,16,${H/2})" text-anchor="middle">Escalation-to-authority ratio →</text>`;
    svg += `<text x="${PAD+8}" y="${PAD+16}" class="quad-label">Making bad calls quietly</text>`;
    svg += `<text x="${W-PAD-8}" y="${PAD+16}" class="quad-label" text-anchor="end">Real handhold cases</text>`;
    svg += `<text x="${PAD+8}" y="${H-PAD-8}" class="quad-label">Healthy / low-touch</text>`;
    svg += `<text x="${W-PAD-8}" y="${H-PAD-8}" class="quad-label" text-anchor="end">Complex or ramping</text>`;
    rows.forEach(r => {
      const cx = xScale(r.totalMin), cy = yScale(r.ratio);
      const radius = 14 + Math.min(14, r.count);
      const initials = r.hod.split(/[\s&/]+/).map(w=>w[0]).join('').slice(0,3).toUpperCase();
      const color = r.ratio>50 ? '#EA1D24' : (r.ratio>25 ? '#B08D57' : '#2E7D5B');
      svg += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="${color}" opacity="0.88"><title>${r.hod}: ${(r.totalMin/60).toFixed(1)} hrs, ${Math.round(r.ratio)}% avoidable</title></circle>`;
      svg += `<text x="${cx}" y="${cy+4}" class="dot-label">${initials}</text>`;
    });
    svg += `</svg>`;
    return `<div class="card">
      <h2><span class="n">·</span>Handhold map</h2>
      <div class="hint" style="margin-bottom:10px;">X = time consumed this period. Y = share of escalations the HOD could have decided alone. Bubble size = number of interactions logged.</div>
      ${svg}
    </div>`;
  }

  function median(arr){
    const s = arr.slice().sort((a,b)=>a-b);
    const mid = Math.floor(s.length/2);
    return s.length % 2 ? s[mid] : (s[mid-1]+s[mid])/2;
  }

  function renderDecisionSpeed(data){
    const withOutcome = data.filter(e=>e.urgency!=='not-urgent' && e.decisionTimeHours!=null && e.outcome!=='pending');
    if (!withOutcome.length) return `<div class="card"><h2><span class="n">·</span>Decision speed vs outcome</h2><div class="empty">No closed-out blocking/time-sensitive entries yet — record outcomes in the "Pending Outcomes" tab.</div></div>`;
    const buckets = [
      {label:"< 24 hrs", test:h=>h<=24},
      {label:"1–3 days", test:h=>h>24&&h<=72},
      {label:"3–7 days", test:h=>h>72&&h<=168},
      {label:"> 7 days", test:h=>h>168},
    ];
    const rows = buckets.map(b=>{
      const items = withOutcome.filter(e=>b.test(e.decisionTimeHours));
      const wins = items.filter(e=>e.outcome==='win').length;
      const losses = items.filter(e=>e.outcome==='loss').length;
      return {label:b.label, n:items.length, wins, losses};
    }).filter(r=>r.n>0);
    return `<div class="card">
      <h2><span class="n">·</span>Decision speed vs outcome</h2>
      <table><thead><tr><th>Time-to-decision</th><th>Items</th><th>Won</th><th>Lost</th><th>Win rate</th></tr></thead><tbody>
      ${rows.map(r=>`<tr><td>${r.label}</td><td>${r.n}</td><td>${r.wins}</td><td>${r.losses}</td><td>${Math.round(100*r.wins/r.n)}%</td></tr>`).join('')}
      </tbody></table>
    </div>`;
  }

  function renderSettings(content){
    content.innerHTML = `
      <div class="card">
        <h2><span class="n">·</span>Google Sheet connection</h2>
        <div class="hint" style="margin-bottom:14px;">
          This tracker talks to a Google Apps Script Web App bound to your sheet — the same JSONP pattern used across Mangalam HQ (VP Dashboard, HOD Portal, BD Tracker). Deploy the script once, paste the Web App URL below.
        </div>
        <div class="field">
          <label>Apps Script Web App URL</label>
          <input type="text" id="s-url" placeholder="https://script.google.com/macros/s/XXXXX/exec" value="${scriptUrl || ''}">
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="btn gold" id="s-save">Save &amp; connect</button>
          <span id="s-status" class="hint" style="margin:0;">
            ${connectionStatus==='connected' ? '<span style="color:#2E7D5B;font-weight:700;">Connected — reading live from your sheet.</span>' : ''}
            ${connectionStatus==='error' ? '<span style="color:#EA1D24;font-weight:700;">' + escapeHtml(connectionError) + '</span>' : ''}
            ${connectionStatus==='unconfigured' ? 'Not connected yet.' : ''}
          </span>
        </div>
      </div>
      <div class="card">
        <h2><span class="n">·</span>One-time setup (5 minutes)</h2>
        <ol style="font-size:13.5px;line-height:1.9;color:#2a2a2a;padding-left:20px;">
          <li>Create a new Google Sheet (or reuse an existing Mangalam HQ sheet) — add a tab named <strong>Entries</strong>.</li>
          <li>Extensions → Apps Script. Delete any starter code and paste the <strong>Founder_Dependency_Backend.gs</strong> script provided separately.</li>
          <li>Click <strong>Deploy → New deployment → Web app</strong>. Set "Execute as: Me" and "Who has access: Anyone with the link". Deploy.</li>
          <li>Copy the Web App URL it gives you (ends in <code>/exec</code>) and paste it above.</li>
          <li>Whenever you edit the script later: <strong>Deploy → Manage deployments → Edit → New version → Deploy</strong> — saving alone won't update the live URL.</li>
        </ol>
      </div>
    `;
    content.querySelector('#s-save').addEventListener('click', async ()=>{
      const url = content.querySelector('#s-url').value.trim();
      if (!url) { showToast("Paste the Web App URL first"); return; }
      await saveScriptUrlConfig(url);
      showToast("Connecting…");
      await refreshEntries();
      if (connectionStatus === 'connected') { activeTab = 'log'; }
      render();
    });
  }

  content_init();
  async function content_init(){
    await loadScriptUrlConfig();
    await refreshEntries();
    render();
    document.addEventListener('click', async (e)=>{
      const del = e.target.getAttribute && e.target.getAttribute('data-del');
      if (del) {
        try {
          const res = await api.remove(del);
          if (!res || !res.ok) throw new Error((res && res.error) || "Sheet rejected the delete");
          await refreshEntries();
          render();
        } catch(err) {
          showToast("Could not delete: " + err.message);
        }
      }
    });
  }
})();
</script>
